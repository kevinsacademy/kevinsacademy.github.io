<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevin's Academy 🚀</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* Dark charcoal background */
            color: #ffffff; /* White text for readability */
        }
        nav {
            background-color: #000000; /* Pure black nav bar */
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #ffcc00; /* Yellow accent line under menu */
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        nav a:hover {
            color: #ffcc00; /* Yellow links on hover */
        }
        .logo {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffcc00; /* Yellow logo text */
        }
        .hero {
            max-width: 800px;
            margin: 60px auto;
            padding: 40px;
            background: #262626; /* Dark grey container card */
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-left: 5px solid #ffcc00; /* Yellow highlight bar on the side */
        }
        h1 {
            color: #ffcc00; /* Yellow main heading */
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        p {
            color: #cccccc; /* Light grey body text */
            font-size: 1.2rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Kevin's Academy 🚀</div>
        <div>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Welcome to Kevin's Academy</h1>
        <p>Your journey into learning and growth starts here. Stay tuned for upcoming content!</p>
    </div>

</body>
</html>
